apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flask-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/<you>/devsecops-lab.git
    targetRevision: main
    path: helm/flask-api
    helm: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: flask-api
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: ["CreateNamespace=true"]